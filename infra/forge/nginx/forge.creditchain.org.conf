# Static Forge IDE site for forge.creditchain.org.

server {
  listen 80;
  listen [::]:80;
  server_name forge.creditchain.org;

  location /.well-known/acme-challenge/ {
    root /var/www/_acme;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name forge.creditchain.org;

  include snippets/ssl-params.conf;
  ssl_certificate     /etc/letsencrypt/live/creditchain.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/creditchain.org/privkey.pem;

  root __FORGE_WEB_ROOT__;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    add_header content-type text/plain;
    return 200 "ok\n";
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|wasm|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
